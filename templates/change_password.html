<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">
    <div class="container col-md-4 card p-4 shadow">
        <h3>Update Your Password</h3>
        <form method="POST">
            <input type="password" name="new_password" class="form-control mb-3" placeholder="Enter New Password" required>
            <button type="submit" class="btn btn-success w-100">Save New Password</button>
        </form>
    </div>
</body>
</html>
