<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5">
    <h2>Super Admin Control Center</h2>
    <hr>
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h4>Staff Access</h4>
                <table class="table">
                    <thead><tr><th>Username</th><th>Role</th><th>Password Status</th></tr></thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user.username }}</td>
                            <td><span class="badge bg-primary">{{ user.role }}</span></td>
                            <td><small class="text-muted">Encrypted/Hidden</small></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h4>Active Clinics</h4>
                <ul class="list-group">
                    {% for clinic in clinics %}
                    <li class="list-group-item">{{ clinic.location_name }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
    <br><a href="/" class="btn btn-secondary">Back to Dashboard</a>
</body>
</html>
