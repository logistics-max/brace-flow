<!DOCTYPE html>
<html>
<head>
    <title>Brace Logistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { margin: 0 10px; color: #1a73e8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/portal/coordinator">Coordinator</a> | 
        <a href="/portal/workshop">Workshop</a> | 
        <a href="/portal/store">Store</a> | 
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="card">
        <h2 style="margin-top:0; color:#1a73e8;">Clinic Requisition</h2>
        <p style="font-size: 14px; color: #666;">Enter brace production request below:</p>
        
        <form action="/submit_request" method="POST">
            <label>Select Clinic:</label>
            <input list="clinics" name="clinic_name" placeholder="Type clinic name..." required>
            <datalist id="clinics">
                <option value="Abebech Gobena MCH Hospital">
                <option value="Alert Comprehensive Hospital">
                <option value="Black Lion Hospital">
                <option value="CURE Hospital Addis Ababa">
                </datalist>

            <label>Brace Type:</label>
            <select name="brace_type">
                <option value="AFO Shoe Brace">AFO Shoe Brace</option>
                <option value="KAFO Shoe Brace">KAFO Shoe Brace</option>
            </select>

            <label>Size (4 to 16):</label>
            <select name="brace_size">
                {% for i in range(4, 17) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>

            <label>Quantity:</label>
            <input type="number" name="quantity" value="1" min="1">

            <button type="submit">SUBMIT FOR APPROVAL</button>
        </form>
    </div>
</body>
</html>
