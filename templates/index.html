<!DOCTYPE html>
<html>
<head>
    <title>Brace Logistics</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .nav { background: #1a73e8; padding: 15px; text-align: center; }
        .nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .card { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Clinic Entry</a> | <a href="/portal/coordinator">Coordinator</a> | <a href="/portal/workshop">Workshop</a> | <a href="/portal/store">Store</a>
    </div>
    <div class="card">
        <h2>Production Request</h2>
        <form action="/submit" method="POST">
            <label>Select Clinic (70 clinics included):</label>
            <input list="clinics" name="clinic_name" placeholder="Search clinic..." required>
            <datalist id="clinics">
                <option value="Abebech Gobena MCH Hospital"><option value="Alert Comprehensive Hospital">
                <option value="Black Lion Hospital"><option value="CURE Hospital Addis Ababa">
                <option value="Felege Hiwot Hospital Bahirdar"><option value="Yirgalem Hospital">
                <option value="Worabe Comprehensive Specialized Hospital">
                </datalist>
            <label>Brace Size:</label>
            <select name="brace_size">
                {% for i in range(4, 17) %}<option value="{{i}}">Size {{i}}</option>{% endfor %}
            </select>
            <label>Quantity:</label>
            <input type="number" name="quantity" value="1" min="1">
            <button type="submit">Submit for Approval</button>
        </form>
    </div>
</body>
</html>
