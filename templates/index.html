<!DOCTYPE html>
<html>
<head>
    <title>Brace Logistics Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Brace Order Entry</h2>
        <form action="/submit" method="POST">
            <label>Clinic Name</label>
            <input type="text" name="clinic_name" placeholder="Enter Clinic Name" required>
            
            <label>Brace Type</label>
            <select name="brace_type">
                <option>AFO</option>
                <option>KAFO</option>
                <option>Wrist Brace</option>
                <option>Back Brace</option>
            </select>
            
            <label>Quantity</label>
            <input type="number" name="quantity" value="1" required>
            
            <button type="submit">Send to Google Sheet</button>
        </form>
    </div>
</body>
</html>
