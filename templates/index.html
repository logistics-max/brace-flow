<!DOCTYPE html>
<html>
<head>
    <title>Brace Logistics Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Order Entry</h2>
        <form action="/submit" method="POST">
            
            <label>Clinic Name (Type to search):</label>
            <input list="clinics" name="clinic_name" placeholder="Search 70 clinics..." required>
            <datalist id="clinics">
                <option value="Abala/Mohammed Akle Memorial Hospital">
                <option value="Abebech Gobena MCH Hospital">
                <option value="Adama Referral Hospital">
                <option value="Adare General Hospital/Busulo">
                <option value="Addigrat Hospital">
                <option value="Adigrat Hospital">
                <option value="Adola Hospital">
                <option value="Alert Comprehensive Hospital">
                <option value="Ambo Hospital">
                <option value="Arbaminch Physical Rehabilitation Center">
                <option value="Asossa Hospital">
                <option value="Assela Referral Hospital+PRC">
                <option value="Bale Goba Hospital">
                <option value="Black Lion Hospital">
                <option value="Bona">
                <option value="Bonga">
                <option value="Bule Hora">
                <option value="Chero Zonal Hospital">
                <option value="CURE Hospital Addis Ababa">
                <option value="Debark General Hospital">
                <option value="Debere Birhane Referral Hospital+ DB University">
                <option value="Debere umane Referral Hospital+ DB University">
                <option value="Debre Markos Hospital">
                <option value="Debre Tabor Hospital">
                <option value="Deder Hospital">
                <option value="Dembi Dollo">
                <option value="Dessie Physical Rehabilitation Center">
                <option value="Dessie Referral Hospital">
                <option value="Dilla University Referral Hospital">
                <option value="Dubti Referral Hospital">
                <option value="Felege Hiwot Hospital Bahirdar">
                <option value="Filtu General Hospital">
                <option value="Finote Selam Hospital">
                <option value="Gambela Referral Hospital">
                <option value="Gelemso General Hospital">
                <option value="Gimbi and Ayra">
                <option value="Gode Hospital">
                <option value="Gondar University Hospital">
                <option value="Grartet Hospital Butajira">
                <option value="Halaba Hospital">
                <option value="Hawassa Referral Hospital">
                <option value="Hiwot Fana Hospital Harrer">
                <option value="Injibara Hospital">
                <option value="Jimma University Hospital">
                <option value="Jinka Hospital">
                <option value="Karamara/Jigjiga Referral Hospital + PRC">
                <option value="Kemise General Hospital">
                <option value="Konso">
                <option value="Lemlem Karl Hospital Maichew">
                <option value="Mekelle Referral Hospital, Abi Adi, and General">
                <option value="Metu Kari Referral Hospital">
                <option value="Mizan Tepi University Teaching Hospital">
                <option value="Moyale Hospital/Ginir">
                <option value="Nekemt Referral Hospital">
                <option value="Nigist Heleni Hospital Hossana">
                <option value="Sabian General Hospital Dire Dawa Dill Chora">
                <option value="Sawola General Hospital">
                <option value="Selale Comprehensive Specialized Hospital">
                <option value="Shambu">
                <option value="Shashemene General Hospital">
                <option value="St. Mary Hospital/Axum university hospital">
                <option value="St. Paul Abet Hospital">
                <option value="St. Peters Specialized Hospital">
                <option value="Suhul Hospital">
                <option value="Tirunesh Beijing General Hospital">
                <option value="Woldiya Specialized Hospital">
                <option value="Wolaita Sodo University Hospital/Sodo Christian">
                <option value="Wolkite University Hospita">
                <option value="Wolliso Hospital (old St. Luke)">
                <option value="Worabe Comprehensive Specialized Hospital">
                <option value="Yeka Kotebe Hospital/Zewditu">
                <option value="Yirgalem Hospital">
            </datalist>

            <label>Brace Type:</label>
            <select name="brace_type">
                <option value="AFO">AFO</option>
                <option value="KAFO">KAFO</option>
                <option value="Wrist Brace">Wrist Brace</option>
                <option value="Back Brace">Back Brace</option>
            </select>

            <label>Brace Size:</label>
            <select name="brace_size">
                <option value="Pediatric">Pediatric</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
                <option value="X-Large">X-Large</option>
                <option value="Custom">Custom Size</option>
            </select>

            <label>Quantity:</label>
            <input type="number" name="quantity" value="1" min="1" required>

            <button type="submit">Submit to Google Sheets</button>
        </form>
    </div>
</body>
</html>
