<!DOCTYPE html>
<html>
<head>
    <title>Logistics Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .nav { background: #1a73e8; padding: 15px; text-align: center; }
        .nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 450px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Order Entry</a>
        <a href="/balancing">Balancing Dashboard</a>
    </div>
    <div class="container">
        <h2 style="text-align:center; color:#1a73e8;">Shoe Brace Order</h2>
        <form action="/submit" method="POST">
            <label>Select Clinic:</label>
            <input list="clinics" name="clinic_name" placeholder="Search 70 clinics..." required>
            <datalist id="clinics">
                <option value="Abala/Mohammed Akle Memorial Hospital">
                <option value="Alert Comprehensive Hospital">
                <option value="Black Lion Hospital">
                <option value="CURE Hospital Addis Ababa">
                <option value="Felege Hiwot Hospital Bahirdar">
                <option value="Yirgalem Hospital">
                <option value="Worabe Specialized Hospital">
                </datalist>

            <label>Brace Type:</label>
            <select name="brace_type">
                <option value="AFO Shoe Brace">AFO Shoe Brace</option>
                <option value="KAFO Shoe Brace">KAFO Shoe Brace</option>
            </select>

            <label>Size (4 - 16):</label>
            <select name="brace_size">
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                <option value="16">16</option>
            </select>

            <label>Quantity:</label>
            <input type="number" name="quantity" value="1" min="1">

            <button type="submit">Send to Google Sheets</button>
        </form>
    </div>
</body>
</html>
